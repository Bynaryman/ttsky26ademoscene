<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; background:black; }
canvas { display:block; margin:auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 256, H = 256;
const canvas = document.getElementById("c");
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext("2d");let t = 0;

// pseudo maze function (no memory)
function maze(x, y) {
let xi = Math.floor(x);
let yi = Math.floor(y);
return ((xi ^ yi) & 1); // checker-style labyrinth
}

function render() {
let img = ctx.createImageData(W, H);
let d = img.data;

for (let y = 0; y < H; y++) {
for (let x = 0; x < W; x++) {

  // screen → ray direction
  let nx = (x / W) - 0.5;

  // fake ray depth
  let depth = 1.0;
  let hit = 0;

  // fixed steps (TT-friendly)
  for (let i = 0; i < 32; i++) {
    let px = nx * depth * 4 + 8;
    let py = depth * 4 + t;

    if (maze(px, py)) {
      hit = 1;
      break;
    }
    depth += 0.05;
  }

  // wall height
  let h = 1.0 / (0.1 + depth);

  // snake (moving light)
  let sx = Math.sin(t)*2;
  let sy = t*2;
  let snake = Math.exp(-((nx*4 - sx)**2 + (depth*4 - sy)**2));

  let col = 0;

  if (hit) {
    let wall = h * 255;
    col = wall + snake*200;
  }

  let i4 = (y*W + x)*4;
  d[i4] = col;
  d[i4+1] = col;
  d[i4+2] = col;
  d[i4+3] = 255;
}

}

ctx.putImageData(img, 0, 0);
t += 0.03;
requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
